<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Yoga</title>
  </head>
  <body>
    <div class="container">
      <img class="img-yoga" src="assets/yoga.svg" alt="Yoga" />
      <input placeholder="username" type="email" name="personal-email" />
      <input
        class="input-password"
        placeholder="password"
        type="password"
        name="personal-password"
      />
      <a class="forgot-password" href="#">forgot password?</a>
      <button>Login</button>
      <a class="link-signup" href="#"
        >Don't have an account, <strong>Sign up</strong> now.</a
      >
      <p class="or-paragraph">Or</p>
      <div class="social-media">
        <a href="#">
          <img src="assets/redes.svg" alt="Redes sociales" />
        </a>
      </div>
    </div>
  </body>
</html>
